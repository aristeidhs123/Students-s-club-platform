<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile - CluP</title>
  <link rel="stylesheet" href="../styles/style.css" />
  <style>
    .profile-wrap { max-width:1100px; margin:40px auto; display:flex; gap:28px; padding:0 18px; }
    .profile-card { background:var(--bg-panel); border-radius:14px; padding:22px; flex:0 0 360px; border:1px solid rgba(255,255,255,0.06); }
    .profile-card img { width:100%; height:260px; object-fit:cover; border-radius:10px; margin-bottom:14px; }
    .profile-form { flex:1; background:var(--bg-panel); border-radius:14px; padding:22px; border:1px solid rgba(255,255,255,0.06); }
    .form-row { display:flex; gap:12px; margin-bottom:12px; }
    .form-row .col { flex:1; }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="logo">Cl<span>UP</span></div>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="clubs.html">Clubs</a>
      <a href="events.html">Events</a>
      <a href="announcments.html">Announcements</a>
      <a href="reviews.html">Reviews</a>
      <a href="profile.html">Profile</a>
    </nav>
    <button class="login-btn">Login</button>
  </header>

  <section class="page-note">
    <p>**Σελίδα προφίλ: Εμφάνιση και επεξεργασία στοιχείων χρήστη.**</p>
  </section>

  <main>
    <div class="profile-wrap">
      <aside class="profile-card" id="viewCard">
        <img id="profileImage" src="https://via.placeholder.com/600x400?text=Profile" alt="Profile">
        <h2 id="viewName">Όνομα Επώνυμο</h2>
        <div class="profile-meta" id="viewRole">Role: user</div>
        <div class="profile-bio" id="viewBio">Σύντομη περιγραφή...</div>
      </aside>

      <section class="profile-form">
        <h3>Επεξεργασία Προφίλ</h3>
        <form id="profileForm">
          <div class="form-row">
            <div class="col">
              <label for="name">Όνομα</label>
              <input id="name" name="name" type="text" />
            </div>
            <div class="col">
              <label for="lastname">Επώνυμο</label>
              <input id="lastname" name="lastname" type="text" />
            </div>
          </div>
          <button type="button" class="primary-btn" id="saveBtn">Save</button>
          <button type="button" id="resetBtn">Reset</button>
        </form>
      </section>
    </div>
  </main>
</body>
</html>
