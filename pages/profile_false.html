<section class="section">
  <h2>User Profile</h2>

  <div id="profile-card" class="card"></div>
</section>

<script>
// TODO: Αντικατάστησε με fetch("/api/user/me")
async function fetchUserProfile() {
  return {
    name: "Dionysia",
    lastname: "Mavrothalassiti",
    email: "user@example.com",
    role: "user",
    bio: "Short bio...",
    interests: "Music, Tech"
  };
}

async function renderProfile() {
  const u = await fetchUserProfile();
  const card = document.getElementById("profile-card");

  card.innerHTML = `
    <div class="card-content">
      <h3>${u.name} ${u.lastname}</h3>
      <p><strong>Email:</strong> ${u.email}</p>
      <p><strong>Role:</strong> ${u.role}</p>
      <p><strong>Bio:</strong> ${u.bio}</p>
      <p><strong>Interests:</strong> ${u.interests}</p>
      <button class="btn btn-primary full">Edit Profile</button>
    </div>
  `;
}

renderProfile();
</script>
