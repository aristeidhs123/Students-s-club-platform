<section class="page-note">
  <p>**Σελίδα εκδηλώσεων: Προβολή και σύνδεση με events API.**</p>
</section>

<section class="section">
  <h2>Events</h2>
  <div id="events-container" class="cards-grid"></div>
</section>

<script>
// TODO: Αντικατάστησε με fetch("/api/events")
async function fetchEvents() {
  return [
    {
      title: "Hackathon 2024",
      description: "24-hour coding challenge",
      location: "Patras",
      seats: 50
    }
  ];
}

async function renderEvents() {
  const events = await fetchEvents();
  const container = document.getElementById("events-container");

  container.innerHTML = events.map(ev => `
    <div class="card">
      <div class="card-top bg-purple"></div>
      <div class="card-content">
        <h3>${ev.title}</h3>
        <p>${ev.description}</p>
        <p><strong>Location:</strong> ${ev.location}</p>
        <p><strong>Seats:</strong> ${ev.seats}</p>
        <button class="btn btn-primary full">View Event</button>
      </div>
    </div>
  `).join("");
}

renderEvents();
</script>

</body>
</html>
