<section class="section">
  <h2>Announcements</h2>
  <div id="ann-container" class="cards-grid"></div>
</section>

<script>
// TODO: Αντικατάστησε με fetch("/api/announcements")
async function fetchAnnouncements() {
  return [
    {
      title: "New Meeting",
      description: "Συνάντηση μελών την Παρασκευή",
      date: "2024-05-01"
    }
  ];
}

async function renderAnnouncements() {
  const anns = await fetchAnnouncements();
  const container = document.getElementById("ann-container");

  container.innerHTML = anns.map(a => `
    <div class="card">
      <div class="card-content">
        <h3>${a.title}</h3>
        <p>${a.description}</p>
        <p><strong>Date:</strong> ${a.date}</p>
      </div>
    </div>
  `).join("");
}

renderAnnouncements();
</script>
