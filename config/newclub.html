

<script>          

// συναρτηση για δημιουργεία νεου κλαμπ
    
    document.getElementById('submitbutton'.addEventListener('click', async()=>{
        event.preventDefault()
        const clubtitle = document.getElementById('title').value;
        const clubdescription = document.getElementById('description').value;
        
        const newclub ={
            title: clubtitle,
            description: clubdescription,
            managerid: user.data.manager_id
        }
        fetch('http://localhost:3000/api/newclub',{
            method:'POST',
            headers:{
                'Content-Type' : 'application/json'
            },
            body:JSON.stringify(newclub)
            .then(res=>console.log("new club send"))
            .catch(error=> console.error("fetch didnt work"))
        })
    }))

    //συναρτηση που δειχνει ολα τα ενεργά κλαμπ προς συμμετοχη 

    async function showallclubs(){
        try{
            const res = await fetch('http://localhost:3000/api/showclubs')
            if(res.ok){
                const club = await res.json()
                const pr = document.getElementById('divname') //εδώ θα βάλουμε το όνομα του id του div που θα εμφανιστούν τα κλαμπσ
                club.data.forEach((item) => {
                    const eachclub = document.createElement("p")
                    console.log(item)
                    eachclub.innerHTML += ` <h3>${item.title}</h3>
                                            <p>Περιγραφή: ${item.description}</p>
                                            <button type="submit" id="joinclubbutton"> Join Now </button>
                                            `
                    pr.appendChild(eachclub)

                    const clubidjoin = document.getElementById(item.club_id).value;
                    const useridjoin = ""
                    newmember={
                        clubid: clubidjoin,
                        userid: useridjoin // εδω βάζουμε το id του χρηστη που ειναι logged in
                    }

                    document.getElementById('joinclubbutton'.addEventListener('click', async()=>{
                        
                        fetch('http://localhost:3000/api/joinclub',{
                            method:'POST',
                            headers:{
                                'Content-Type' : 'application/json'
                            },
                            body:JSON.stringify(newmember)
                        })
                    }))
                });
            }
            else{
                throw new Error('error cannot fetch clubs')
            }
        }
        catch(error){
            console.error('Error:', error)
        }
    }

    //συνάρτηση που δείχνει όλα τα κλαμπ που δεν έχουν γίνει δεκτά ακόμη (για τον ADMIN)

     async function showpendingclubs(){
        try{
            const res = await fetch('http://localhost:3000/api/showpendingClub')
            if(res.ok){
                const pendingclub = await res.json()
                const pr = document.getElementById('divname') //εδώ θα βάλουμε το όνομα του id του div που θα εμφανιστούν τα κλαμπσ
                pendingclub.data.forEach((item) => {
                    const eachpendingclub = document.createElement("p")
                    console.log(item)
                    eachpendingclub.innerHTML += ` <h3>${item.title}</h3>
                                            <p>Περιγραφή: ${item.description}</p>
                                            <p>Δημιουργός: ${item.manager_id}</p>
                                            <button type="submit" id="acceptbutton"> Accept </button>
                                            <button type="submit" id="rejectbutton"> Reject </button>
                                            `
                    pr.appendChild(eachpendingclub)
                    //κάτω απο κάθε pending club υπάρχουν δύο κουμπια accept reject για να επιλέξει ο admin


                    document.getElementById('acceptbutton'.addEventListener('click', async()=>{
                        const clubidacc = document.getElementById(item.club_id).value;
                        const useridacc= item.manager_id
                        const acceptclub={
                            club_id: clubidacc,
                            manager_id: useridacc
                        }

                        fetch('http://localhost:3000/api/acceptnewclub',{
                            method:'POST',
                            headers:{
                                'Content-Type' : 'application/json'
                            },
                            body:JSON.stringify(acceptclub)
                        })


                    }))

                    document.getElementById('rejectbutton'.addEventListener('click', async()=>{
                        const clubidrej = document.getElementById(item.club_id).value;
                        fetch('http://localhost:3000/api/rejectnewclub',{
                            method:'POST',
                            headers:{
                                'Content-Type' : 'application/json'
                            },
                            body:JSON.stringify(clubidrej)
                        })


                    }))




                });
            }
            else{
                throw new Error('error cannot fetch clubs')
            }
        }
        catch(error){
            console.error('Error:', error)
        }
    }

    


</script>
